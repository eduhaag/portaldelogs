<po-page-default p-title="Histórico de análises" [p-actions]="pageActions">
  <po-widget>
    <div class="table-shell">
      <po-table
        [p-columns]="historyColumns"
        [p-items]="historyRows"
        [p-loading]="historyLoading"
        [p-striped]="true"
        p-no-data="Nenhuma análise registrada ainda.">
      </po-table>
    </div>
  </po-widget>
</po-page-default>
